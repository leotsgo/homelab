apiVersion: apps/v1
kind: Deployment
metadata:
  name: beaverhabits
  namespace: beaverhabits
  labels:
    app: beaverhabits
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: beaverhabits
  template:
    metadata:
      labels:
        app: beaverhabits
    spec:
      initContainers:
        # The image runs as uid 65534 (nobody), but the hostPath mount is
        # created root:root 0755, so the app can't create habits.db. chown the
        # mount before startup. Declarative + self-healing across node rebuilds.
        - name: fix-perms
          image: busybox:1.38
          command: ["sh", "-c", "chown -R 65534:65534 /app/.user"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /app/.user
      containers:
        - name: beaverhabits
          image: daya0576/beaverhabits:0.9.1
          env:
            - name: TZ
              value: "America/Sao_Paulo"
            - name: HABITS_STORAGE
              value: "DATABASE"
            - name: MAX_USER_COUNT
              value: "1"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /app/.user/
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: beaverhabits-data
