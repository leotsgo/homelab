apiVersion: apps/v1
kind: Deployment
metadata:
  name: yaft
  namespace: yaft
  labels:
    app: yaft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yaft
  template:
    metadata:
      labels:
        app: yaft
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: yaft
          image: ghcr.io/leotsgo/yaft:a3df43c
          env:
            - name: YAFT_ENV
              value: "production"
            - name: TZ
              value: "America/Sao_Paulo"
            - name: YAFT_HTTP_ADDR
              value: ":8080"
            - name: YAFT_PUBLIC_URL
              value: "https://yaft.leotsgo.dev"
            - name: YAFT_AUTH_SECURE_COOKIES
              value: "true"
            - name: YAFT_BOOTSTRAP_EMAIL
              value: "me@leotsgo.dev"
            - name: YAFT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: yaft-secrets
                  key: DATABASE_URL
            - name: YAFT_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: yaft-secrets
                  key: JWT_SECRET
            - name: YAFT_TOTP_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: yaft-secrets
                  key: TOTP_ENCRYPTION_KEY
            - name: YAFT_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yaft-secrets
                  key: BOOTSTRAP_PASSWORD
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
