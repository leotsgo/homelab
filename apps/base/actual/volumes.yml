apiVersion: v1
kind: PersistentVolume
metadata:
  name: actual-data
  namespace: actual
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Recycle
  storageClassName: actual
  hostPath:
    path: /var/data/actual/data/
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: actual-data
  namespace: actual
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: actual
  volumeName: actual-data
