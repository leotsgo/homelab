# --- shared media library/downloads (hardlink-capable: one volume for qB+unflac+Lidarr) ---
apiVersion: v1
kind: PersistentVolume
metadata: { name: media-data, namespace: media }
spec:
  capacity: { storage: 150Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: media
  hostPath: { path: /var/data/media/ }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: media-data, namespace: media }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 150Gi } }
  storageClassName: media
  volumeName: media-data
---
apiVersion: v1
kind: PersistentVolume
metadata: { name: qbittorrent-config, namespace: media }
spec:
  capacity: { storage: 1Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: qbittorrent
  hostPath: { path: /var/data/qbittorrent/ }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: qbittorrent-config, namespace: media }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
  storageClassName: qbittorrent
  volumeName: qbittorrent-config
---
apiVersion: v1
kind: PersistentVolume
metadata: { name: prowlarr-config, namespace: media }
spec:
  capacity: { storage: 1Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: prowlarr
  hostPath: { path: /var/data/prowlarr/ }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: prowlarr-config, namespace: media }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
  storageClassName: prowlarr
  volumeName: prowlarr-config
---
apiVersion: v1
kind: PersistentVolume
metadata: { name: lidarr-config, namespace: media }
spec:
  capacity: { storage: 2Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: lidarr
  hostPath: { path: /var/data/lidarr/ }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: lidarr-config, namespace: media }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 2Gi } }
  storageClassName: lidarr
  volumeName: lidarr-config
---
apiVersion: v1
kind: PersistentVolume
metadata: { name: navidrome-data, namespace: media }
spec:
  capacity: { storage: 2Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: navidrome
  hostPath: { path: /var/data/navidrome/ }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: navidrome-data, namespace: media }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 2Gi } }
  storageClassName: navidrome
  volumeName: navidrome-data
---
# slskd config + sqlite (slskd-only).
apiVersion: v1
kind: PersistentVolume
metadata: { name: slskd-config, namespace: media }
spec:
  capacity: { storage: 1Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: slskd-config
  hostPath: { path: /var/data/slskd/config/ }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: slskd-config, namespace: media }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
  storageClassName: slskd-config
  volumeName: slskd-config
---
# slskd raw downloads — shared between slskd (writes) and soulbeet (reads, then
# beets imports → /music/soulbeet which lives inside media-data via subPath).
apiVersion: v1
kind: PersistentVolume
metadata: { name: slskd-downloads, namespace: media }
spec:
  capacity: { storage: 50Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: slskd-downloads
  hostPath: { path: /var/data/slskd/downloads/ }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: slskd-downloads, namespace: media }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 50Gi } }
  storageClassName: slskd-downloads
  volumeName: slskd-downloads
---
# soulbeet sqlite db (soulbeet-only). The beets library DB lives next to the
# music files at /var/data/media/library/music/soulbeet/.beets_library.db
# (inside the existing media-data PVC, mounted into soulbeet via subPath).
apiVersion: v1
kind: PersistentVolume
metadata: { name: soulbeet-data, namespace: media }
spec:
  capacity: { storage: 1Gi }
  accessModes: [ReadWriteOnce]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: soulbeet-data
  hostPath: { path: /var/data/soulbeet/data/ }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: soulbeet-data, namespace: media }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
  storageClassName: soulbeet-data
  volumeName: soulbeet-data
