apiVersion: v1
kind: ConfigMap
metadata:
  name: unflac-script
  namespace: media
data:
  split.sh: |
    #!/bin/sh
    set -eu
    BIN=/data/bin/unflac
    SRC=/data/torrents/music
    OUT=/data/import/music
    mkdir -p "$OUT"
    if [ ! -x "$BIN" ]; then echo "unflac missing (initContainer build failed?)"; exit 1; fi
    # unflac takes the .cue as positional INPUT; it auto-detects cue encoding and finds
    # the audio file in the cue's dir, writing <Artist>/<Album>/<tracks> under -o.
    find "$SRC" -name '*.cue' | while read -r cue; do
      dir=$(dirname "$cue")
      [ -f "$dir/.unflac-done" ] && continue
      echo "splitting: $cue"
      # unflac's parser chokes on stray apostrophes in unquoted REM lines
      # (e.g. `REM COMMENT ... Sander's tube preamp ...`). Run unflac against a
      # sanitized copy in a tmpdir with the audio files symlinked in so the
      # `FILE "..."` directive still resolves.
      tmp=$(mktemp -d)
      for f in "$dir"/*; do ln -s "$f" "$tmp/$(basename "$f")"; done
      cue_name=$(basename "$cue")
      rm -f "$tmp/$cue_name"
      grep -v '^REM ' "$cue" > "$tmp/$cue_name"
      if "$BIN" -o "$OUT" "$tmp/$cue_name"; then
        touch "$dir/.unflac-done"; echo "done: $dir"
      else
        echo "FAILED (left for retry): $dir"
      fi
      rm -rf "$tmp"
    done
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: unflac
  namespace: media
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext: { runAsUser: 1000, runAsGroup: 1000, fsGroup: 1000 }
          initContainers:
            - name: build-unflac
              image: golang:1.24-alpine
              securityContext: { runAsUser: 0 }   # apk + go build need root; binary lands in /data/bin (exec'd by uid 1000)
              command:
                - /bin/sh
                - -c
                - 'if [ ! -x /data/bin/unflac ]; then apk add --no-cache git >/dev/null && GOBIN=/data/bin go install git.sr.ht/~ft/unflac@latest; fi'
              env:
                - { name: HOME, value: "/tmp" }
                - { name: GOPATH, value: "/tmp/go" }
                - { name: GOCACHE, value: "/tmp/gocache" }
                - { name: GOFLAGS, value: "-mod=mod" }
              volumeMounts:
                - { name: data, mountPath: /data }
              resources:
                requests: { memory: "128Mi", cpu: "100m" }
                limits: { memory: "768Mi", cpu: "1500m" }
          containers:
            - name: unflac
              image: jrottenberg/ffmpeg:7-alpine
              command: ["/bin/sh", "/script/split.sh"]
              volumeMounts:
                - { name: data, mountPath: /data }
                - { name: script, mountPath: /script }
              resources:
                requests: { memory: "256Mi", cpu: "100m" }
                limits: { memory: "4Gi", cpu: "2000m" }
          volumes:
            - name: data
              persistentVolumeClaim: { claimName: media-data }
            - name: script
              configMap: { name: unflac-script }
