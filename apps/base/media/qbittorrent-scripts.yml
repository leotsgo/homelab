apiVersion: v1
kind: ConfigMap
metadata:
  name: qbittorrent-scripts
  namespace: media
data:
  # linuxserver custom-cont-init.d — runs as root BEFORE qB starts. Bypass WebUI
  # auth for localhost so gluetun's PF up-command can set the listen port via the
  # local qB API without credentials. Idempotent; applies on next container start
  # (the conf must already exist — it does after first run).
  10-localhostauth.sh: |
    #!/bin/sh
    CONF=/config/qBittorrent/qBittorrent.conf
    [ -f "$CONF" ] || exit 0
    if grep -q 'LocalHostAuth' "$CONF"; then
      sed -i 's|^WebUI\\LocalHostAuth=.*|WebUI\\LocalHostAuth=false|' "$CONF"
    else
      sed -i '/^\[Preferences\]/a WebUI\\LocalHostAuth=false' "$CONF"
    fi
  # gluetun VPN_PORT_FORWARDING_UP_COMMAND target — runs in the gluetun container
  # whenever the Proton forwarded port changes. Sets qB's listen port via the local
  # API (no auth, LocalHostAuth bypassed). Retries until qB's WebUI is reachable.
  pf-up.sh: |
    #!/bin/sh
    PORT="$(cat /tmp/gluetun/forwarded_port 2>/dev/null)"
    [ -n "$PORT" ] || exit 0
    i=0
    while [ "$i" -lt 12 ]; do
      if wget -qO- --post-data="json={\"listen_port\":$PORT}" http://127.0.0.1:8080/api/v2/app/setPreferences >/dev/null 2>&1; then
        echo "pf-up: set qB listen_port=$PORT"; exit 0
      fi
      i=$((i+1)); sleep 5
    done
    echo "pf-up: failed to set port $PORT after retries"; exit 0
