apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
  labels: { app: qbittorrent }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: qbittorrent } }
  template:
    metadata: { labels: { app: qbittorrent } }
    spec:
      # ndots:1 so external tracker domains (e.g. bt2.t-ru.org) resolve as absolute
      # first. k8s default ndots:5 makes libtorrent's async resolver exhaust the
      # search-domain lookups and give up (Host not found) → 0 seeds/peers, even
      # though nslookup/curl work.
      dnsConfig:
        options:
          - { name: ndots, value: "1" }
      # gluetun-in-k8s gotcha: when the gluetun container restarts in place (kubelet
      # restart, healthcheck-triggered VPN restart) the pod's netns is preserved, so
      # the `ip -6 rule add ... table 51820` from the previous instance is still in
      # the kernel. New gluetun bails with "adding ip rule 101: file exists" and
      # backs off 4h, taking the HTTP proxy down with it (Prowlarr sees 503 from
      # the proxy → "Unable to connect to indexer"). Clear stale gluetun ip rules
      # before it starts. See https://github.com/qdm12/gluetun-wiki/blob/main/setup/advanced/kubernetes.md#adding-ipv6-rule--file-exists
      initContainers:
        - name: clear-stale-gluetun-rules
          image: alpine:3.24
          securityContext:
            capabilities: { add: ["NET_ADMIN"] }
          command:
            - sh
            - -c
            - |
              set -eu
              ip -6 rule del from all to all table 51820 2>/dev/null || true
              ip -4 rule del from all to all table 51820 2>/dev/null || true
              echo "cleared any stale gluetun routing rules from prior netns lifetime"
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3.40.0
          securityContext:
            capabilities: { add: ["NET_ADMIN"] }
          env:
            - { name: VPN_SERVICE_PROVIDER, value: "protonvpn" }
            - { name: VPN_TYPE, value: "wireguard" }
            - name: WIREGUARD_PRIVATE_KEY
              valueFrom: { secretKeyRef: { name: proton-wg, key: WIREGUARD_PRIVATE_KEY } }
            - name: WIREGUARD_ADDRESSES
              valueFrom: { secretKeyRef: { name: proton-wg, key: WIREGUARD_ADDRESSES } }
            # Port-forwarding ON — Proton WG config now has NAT-PMP/PF enabled (P2P server).
            # NOTE: do NOT re-add PORT_FORWARD_ONLY — it caused server-rotation flapping.
            - { name: VPN_PORT_FORWARDING, value: "on" }
            - { name: VPN_PORT_FORWARDING_PROVIDER, value: "protonvpn" }
            # Auto-set qB's listen port to the forwarded port on every PF change.
            - { name: VPN_PORT_FORWARDING_UP_COMMAND, value: "/bin/sh /gluetun-scripts/pf-up.sh" }
            # HTTP proxy (:8888) so other pods (Prowlarr) can egress through Proton.
            - { name: HTTPPROXY, value: "on" }
            - { name: FIREWALL_INPUT_PORTS, value: "8080,8888" }
            - { name: FIREWALL_OUTBOUND_SUBNETS, value: "10.42.0.0/16,10.43.0.0/16" }
            - { name: TZ, value: "America/Sao_Paulo" }
          volumeMounts:
            - { name: gluetun-tmp, mountPath: /tmp/gluetun }
            - { name: scripts, mountPath: /gluetun-scripts/pf-up.sh, subPath: pf-up.sh }
          resources:
            requests: { memory: "64Mi", cpu: "20m" }
            limits: { memory: "256Mi", cpu: "500m" }
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:version-5.2.1_v2.0.13
          env:
            - { name: PUID, value: "1000" }
            - { name: PGID, value: "1000" }
            - { name: TZ, value: "America/Sao_Paulo" }
            - { name: WEBUI_PORT, value: "8080" }
          volumeMounts:
            - { name: config, mountPath: /config }
            - { name: data, mountPath: /data }
            - { name: scripts, mountPath: /custom-cont-init.d/10-localhostauth.sh, subPath: 10-localhostauth.sh }
          resources:
            requests: { memory: "256Mi", cpu: "50m" }
            limits: { memory: "1Gi", cpu: "1000m" }
      volumes:
        - { name: gluetun-tmp, emptyDir: {} }
        - name: scripts
          configMap: { name: qbittorrent-scripts, defaultMode: 0755 }
        - name: config
          persistentVolumeClaim: { claimName: qbittorrent-config }
        - name: data
          persistentVolumeClaim: { claimName: media-data }
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
spec:
  selector: { app: qbittorrent }
  ports:
    - { name: webui, port: 8080, targetPort: 8080 }
    - { name: proxy, port: 8888, targetPort: 8888 }
