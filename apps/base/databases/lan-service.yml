apiVersion: v1
kind: Service
metadata:
  name: homelab-lan
  namespace: databases
  labels:
    app: homelab-lan
spec:
  type: LoadBalancer
  selector:
    cnpg.io/cluster: homelab
    cnpg.io/instanceRole: primary
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
