apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# paperless: base bootstrap is initdb (would create an EMPTY db). Patch it to
# recovery from the externalCluster at s3://leotsgo/paperless, and bump its own
# backup path to -v1 so it does not clobber the VPS's live backups.
# PVC data (/var/data/paperless/{data,media,export,consume,redis}) is hostPath:
# create the dirs + restic-restore before enabling this overlay.
resources:
  - ../../production/paperless
patches:
  - target:
      group: postgresql.cnpg.io
      version: v1
      kind: Cluster
      name: paperless-cluster
    path: cluster-patch.yml
