apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/controllers/hephaestus
  prune: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-configs
  namespace: flux-system
spec:
  interval: 1h
  # Reused verbatim from production: cert-manager ClusterIssuer (DNS-01/Cloudflare),
  # the *.leotsgo.dev wildcard Certificate, and the Traefik tlsstore default cert.
  path: ./infrastructure/configs/production
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
