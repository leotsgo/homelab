apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sysctl-inotify
  namespace: node-tuning
  labels:
    app.kubernetes.io/name: sysctl-inotify
    app.kubernetes.io/part-of: node-tuning
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sysctl-inotify
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sysctl-inotify
        app.kubernetes.io/part-of: node-tuning
    spec:
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      containers:
        - name: sysctl
          image: busybox:1.36
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              cat > /host-sysctl.d/99-k3s-inotify.conf <<EOF
              fs.inotify.max_user_instances = 1024
              fs.inotify.max_user_watches = 524288
              EOF
              echo 1024   > /proc/sys/fs/inotify/max_user_instances
              echo 524288 > /proc/sys/fs/inotify/max_user_watches
              echo "applied: instances=$(cat /proc/sys/fs/inotify/max_user_instances) watches=$(cat /proc/sys/fs/inotify/max_user_watches)"
              exec sleep infinity
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 32Mi
          volumeMounts:
            - name: host-sysctl-d
              mountPath: /host-sysctl.d
      volumes:
        - name: host-sysctl-d
          hostPath:
            path: /etc/sysctl.d
            type: Directory
      terminationGracePeriodSeconds: 5
