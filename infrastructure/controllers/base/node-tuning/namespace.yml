apiVersion: v1
kind: Namespace
metadata:
  name: node-tuning
  # Hosts a deliberately privileged DaemonSet (sets host sysctls), so the
  # namespace opts in to the privileged Pod Security Standard.
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
