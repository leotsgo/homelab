apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-state-metrics
  namespace: monitoring
spec:
  interval: 30m
  releaseName: kube-state-metrics
  chart:
    spec:
      chart: kube-state-metrics
      version: "7.8.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  values:
    # Scraped by Alloy via the service DNS; no ServiceMonitor (no operator here).
    selfMonitor:
      enabled: false
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-node-exporter
  namespace: monitoring
spec:
  interval: 30m
  releaseName: prometheus-node-exporter
  chart:
    spec:
      chart: prometheus-node-exporter
      version: "4.56.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
  values:
    service:
      # Alloy discovers these endpoints by the app label.
      labels:
        app.kubernetes.io/component: metrics
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: monitoring
spec:
  interval: 30m
  releaseName: alloy
  dependsOn:
    - name: kube-state-metrics
  chart:
    spec:
      chart: alloy
      version: "1.10.1"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
  values:
    controller:
      type: daemonset
    alloy:
      configMap:
        content: |-
          // ---- ingest credentials from the vaultwarden-sync Secret ----
          remote.kubernetes.secret "ingest" {
            namespace = "monitoring"
            name      = "monitoring-ingest-auth"
          }

          // ================= METRICS =================
          discovery.kubernetes "nodes" { role = "node" }
          discovery.kubernetes "endpoints" { role = "endpoints" }

          // -- kubelet (scraped through the API server proxy: robust, no kubelet TLS/port fuss) --
          discovery.relabel "kubelet" {
            targets = discovery.kubernetes.nodes.targets
            rule {
              target_label = "__address__"
              replacement  = "kubernetes.default.svc.cluster.local:443"
            }
            rule {
              source_labels = ["__meta_kubernetes_node_name"]
              regex         = "(.+)"
              target_label  = "__metrics_path__"
              replacement   = "/api/v1/nodes/${1}/proxy/metrics"
            }
          }
          prometheus.scrape "kubelet" {
            targets           = discovery.relabel.kubelet.output
            job_name          = "kubelet"
            scheme            = "https"
            bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
            tls_config {
              ca_file     = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              server_name = "kubernetes"
            }
            forward_to = [prometheus.remote_write.zeus.receiver]
          }

          // -- cadvisor (per-container cpu/mem, same API-proxy path) --
          discovery.relabel "cadvisor" {
            targets = discovery.kubernetes.nodes.targets
            rule {
              target_label = "__address__"
              replacement  = "kubernetes.default.svc.cluster.local:443"
            }
            rule {
              source_labels = ["__meta_kubernetes_node_name"]
              regex         = "(.+)"
              target_label  = "__metrics_path__"
              replacement   = "/api/v1/nodes/${1}/proxy/metrics/cadvisor"
            }
          }
          prometheus.scrape "cadvisor" {
            targets           = discovery.relabel.cadvisor.output
            job_name          = "cadvisor"
            scheme            = "https"
            bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
            tls_config {
              ca_file     = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              server_name = "kubernetes"
            }
            forward_to = [prometheus.remote_write.zeus.receiver]
          }

          // -- kube-state-metrics (object state: pod phases, restarts, PVC usage) --
          prometheus.scrape "ksm" {
            targets = [
              { "__address__" = "kube-state-metrics.monitoring.svc.cluster.local:8080", "job" = "kube-state-metrics" },
            ]
            forward_to = [prometheus.remote_write.zeus.receiver]
          }

          // -- node-exporter (discover its endpoints by name) --
          discovery.relabel "node_exporter" {
            targets = discovery.kubernetes.endpoints.targets
            rule {
              source_labels = ["__meta_kubernetes_service_name"]
              regex         = "prometheus-node-exporter"
              action        = "keep"
            }
            rule {
              source_labels = ["__meta_kubernetes_endpoint_node_name"]
              target_label  = "instance"
            }
          }
          prometheus.scrape "node_exporter" {
            targets    = discovery.relabel.node_exporter.output
            job_name   = "node-exporter"
            forward_to = [prometheus.remote_write.zeus.receiver]
          }

          prometheus.remote_write "zeus" {
            endpoint {
              url = "https://prometheus.leotsgo.dev/api/v1/write"
              basic_auth {
                username = convert.nonsensitive(remote.kubernetes.secret.ingest.data["username"])
                password = remote.kubernetes.secret.ingest.data["password"]
              }
            }
            external_labels = { cluster = "hephaestus" }
          }

          // ================= LOGS =================
          discovery.kubernetes "pods" { role = "pod" }
          discovery.relabel "pod_logs" {
            targets = discovery.kubernetes.pods.targets
            rule { source_labels = ["__meta_kubernetes_namespace"];            target_label = "namespace" }
            rule { source_labels = ["__meta_kubernetes_pod_name"];             target_label = "pod" }
            rule { source_labels = ["__meta_kubernetes_pod_container_name"];   target_label = "container" }
            rule { source_labels = ["__meta_kubernetes_pod_node_name"];        target_label = "node" }
            rule { source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]; separator = "/"; target_label = "job" }
          }
          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pod_logs.output
            forward_to = [loki.write.zeus.receiver]
          }
          loki.write "zeus" {
            endpoint {
              url = "https://loki.leotsgo.dev/loki/api/v1/push"
              basic_auth {
                username = convert.nonsensitive(remote.kubernetes.secret.ingest.data["username"])
                password = remote.kubernetes.secret.ingest.data["password"]
              }
            }
            external_labels = { cluster = "hephaestus" }
          }
